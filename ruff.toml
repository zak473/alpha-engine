line-length = 100
target-version = "py312"
src = ["."]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "B008",  # FastAPI Depends() in function defaults — expected pattern
    "N806",  # Uppercase variable names — SQLAlchemy model conventions
]

[lint.isort]
known-first-party = [
    "api", "config", "core", "db",
    "evaluation", "ratings", "simulation", "sports",
]

[format]
quote-style = "double"
indent-style = "space"

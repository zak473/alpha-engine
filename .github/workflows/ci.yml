name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --max-warnings 0
        continue-on-error: true  # lint warnings shouldn't fail CI initially

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.railway.app
          NEXT_PUBLIC_SITE_URL: https://www.neverindoubt.app

  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: python -m py_compile api/main.py api/routers/*.py pipelines/picks/auto_picks.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true  # tests may not exist yet
